services:
  postgres-db:
    image: postgres:latest
    environment:
      POSTGRES_DB: banks_card_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: passbcd
    ports:
      - "5435:5432"
    volumes:
      - banks-card-db-data:/var/lib/postgresql/dat

  bank-app:
    build:
      dockerfile: Dockerfile
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/banks_card_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: passbcd
    ports:
      - "8080:8080"


volumes:
  banks-card-db-data: