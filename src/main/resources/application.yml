# application.yml — главный конфигурационный файл Spring Boot.

#Что нужно сделать:
#  - Настроить параметры безопасности и JWT.
#  - Включить Swagger UI.

spring:
  application:
    name: bank_cards
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/banks_card_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:passbcd}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  mvc:
    contentnegotiation:
      media-types:
        json: application/json
  jackson:
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

secret:
  key: 6++K7214ozh8g2Xxw71+4ULUVJ/Cbu/91RVqCkALErf/zzX22LE2aLAnhFuhFh+VpgpH4kvKxXr0ploPHZ79gw==
  access-token-expiration: 86400000 # 1 день
