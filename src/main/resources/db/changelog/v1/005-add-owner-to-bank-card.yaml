databaseChangeLog:
  - changeSet:
      id: 005-add-owner-to-bank-card
      author: Kirill
      changes:
        - addColumn:
            tableName: bank_cards
            columns:
              - column:
                  name: owner
                  type: varchar(12)
                  constraints:
                    nullable: false
                    references: users(username)
                    foreignKeyName: fk_user_cards
                    deleteCascade: true