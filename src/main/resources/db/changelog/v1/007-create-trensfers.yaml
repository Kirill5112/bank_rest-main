databaseChangeLog:
  - changeSet:
      id: 007-create-trensfers
      author: Kirill
      changes:
        - createTable:
            tableName: transfers
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: payer_card_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payer_card
                    references: bank_cards(id)
              - column:
                  name: payee_card_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payee_card
                    references: bank_cards(id)
              - column:
                  name: amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: timestamp
                  defaultValue: now()
