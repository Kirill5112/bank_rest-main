databaseChangeLog:
  - changeSet:
      id: 001-create-card-table
      author: Kirill
      changes:
        - createTable:
            tableName: bank_cards
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
              - column:
                  name: expire
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: "'ACTIVE'"
              - column:
                  name: balance
                  type: decimal(15,2)
                  constraints:
                    nullable: false
                  defaultValue: "0.00"
              - column:
                  name: number_last4
                  type: varchar(4)
                  constraints:
                    nullable: false
              - column:
                  name: number_mask
                  type: varchar(19)
                  constraints:
                    nullable: false
              - column:
                  name: number_hash
                  type: bytea
                  constraints:
                    nullable: false
                    unique: true
        - sql:
            sql: |
              ALTER TABLE bank_cards 
              ADD CHECK (number_last4 ~ '^[0-9]{4}$'),
              ADD CHECK (status IN ('ACTIVE', 'BLOCKED', 'EXPIRED')),
              ADD CHECK (balance >= 0),
              ADD CHECK (number_mask ~ '^(\*{4} ){3}[0-9]{4}$')
            dbms: postgresql